langchain4j:
  google:
    ai:
      gemini:
        api-key: ${GEMINI_API_KEY:}
        model-name: gemini-2.5-flash
        temperature: 0.2

outreach:
  llm:
    openRouterApiKey: ${OPENROUTER_API_KEY:}
    openRouterModelName: ${OPENROUTER_MODEL_NAME:gpt-oss-120b}
    temperature: 0.2
    maxTokens: 4000

spring:
  profiles:
    active: openrouter
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
