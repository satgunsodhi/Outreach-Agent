langchain4j:
  google:
    ai:
      gemini:
        api-key: ${GEMINI_API_KEY:}
        model-name: gemini-2.5-flash
        temperature: 0.2

outreach:
  llm:
    open-router-api-key: ${OPENROUTER_API_KEY:}
    open-router-model-name: ${OPENROUTER_MODEL_NAME:}
    temperature: 0.2
    max-tokens: 4000
    # Comma-separated ordered list of fallback models for OpenRouter (see .env.example).
    fallback-models: ${OPENROUTER_FALLBACK_MODELS:}

google:
  oauth:
    refresh-token: ${GOOGLE_REFRESH_TOKEN:}
  drive:
    service-account-json: ${GOOGLE_CLIENT_SECRETS_JSON:}
    folder-id: ${GOOGLE_DRIVE_FOLDER_ID:}
    tokens-directory: ${GOOGLE_DRIVE_TOKENS_DIR:tokens}

app:
  ci-batch-mode: ${CI_BATCH_MODE:false}
  delay-between-targets-ms: ${DELAY_BETWEEN_TARGETS_MS:10000}
  targets-file: ${TARGETS_FILE:targets.json}
  followups:
    enabled: ${ENABLE_FOLLOWUPS:false}
  # B5: Role and region for autonomous target discovery — override via env vars in CI.
  discovery:
    role: ${DISCOVERY_ROLE:ML Engineer}
    region: ${DISCOVERY_REGION:Remote or India}
  cors:
    # Comma-separated list of allowed CORS origins. Override via CORS_ALLOWED_ORIGINS env var.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourportfolio.com,http://localhost:3000,http://localhost:5173}

# Gmail sender address — used as the From: header when building MIME messages for the Gmail API
gmail:
  from-address: ${GMAIL_ADDRESS:}

spring:
  profiles:
    active: openrouter
  datasource:
    url: jdbc:h2:file:./data/outreachdb;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      # Disabled in all profiles by default. Re-enabled via application-dev.yml.
      enabled: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.outreach.agent: ${APP_LOG_LEVEL:INFO}
    dev.langchain4j.internal.RetryUtils: ERROR
