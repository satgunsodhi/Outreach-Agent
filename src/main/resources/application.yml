langchain4j:
  google:
    ai:
      gemini:
        api-key: ${GEMINI_API_KEY:}
        model-name: gemini-2.5-flash
        temperature: 0.2

outreach:
  llm:
    openRouterApiKey: ${OPENROUTER_API_KEY:}
    openRouterModelName: ${OPENROUTER_MODEL_NAME:openai/gpt-oss-120b:free}
    temperature: 0.2
    maxTokens: 4000

google:
  oauth:
    refresh-token: ${GOOGLE_REFRESH_TOKEN:}
  drive:
    service-account-json: ${GOOGLE_SERVICE_ACCOUNT_JSON:}
    folder-id: ${GOOGLE_DRIVE_FOLDER_ID:}
    tokens-directory: ${GOOGLE_DRIVE_TOKENS_DIR:tokens}

app:
  ci-batch-mode: ${CI_BATCH_MODE:false}
  targets-file: ${TARGETS_FILE:targets.json}
  followups:
    enabled: ${ENABLE_FOLLOWUPS:false}
  cors:
    # Comma-separated list of allowed CORS origins. Override via CORS_ALLOWED_ORIGINS env var.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://satgunsodhi.vercel.app,http://localhost:3000,http://localhost:5173}

# Gmail sender address — used as the From: header when building MIME messages for the Gmail API
gmail:
  from-address: ${GMAIL_ADDRESS:}

spring:
  profiles:
    active: openrouter
  datasource:
    url: jdbc:h2:file:./data/outreachdb;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      # Disabled in all profiles by default. Re-enabled via application-dev.yml.
      enabled: false

server:
  port: 8080

logging:
  level:
    root: INFO
    com.outreach.agent: ${APP_LOG_LEVEL:INFO}
