<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resume</title>
    <style type="text/css">
        @page {
            size: letter;
            margin: 0.5in;
        }
        body {
            font-family: Arial, sans-serif;
            font-size: 11pt;
            line-height: 1.2;
            color: #000;
        }
        h1 { font-size: 16pt; margin: 0 0 5px 0; text-align: center; }
        .contact-info { text-align: center; margin-bottom: 10px; font-size: 10pt; }
        h2 { font-size: 12pt; border-bottom: 1px solid #000; margin: 10px 0 5px 0; text-transform: uppercase; }
        .item-header { margin-bottom: 2px; }
        .item-title { font-weight: bold; float: left; }
        .item-date { float: right; font-style: italic; }
        .clear { clear: both; }
        .company { font-style: italic; margin-bottom: 3px; }
        ul { margin: 3px 0 10px 0; padding-left: 20px; }
        li { margin-bottom: 3px; text-align: justify; }
        .skills { margin-bottom: 10px; }
        .skill-category { font-weight: bold; }
    </style>
</head>
<body>
    <div th:if="${personalInfo != null}">
        <h1 th:text="${personalInfo.name}">Name</h1>
        <div class="contact-info">
            <span th:text="${personalInfo.email}">email@example.com</span> |
            <span th:text="${personalInfo.phone}">123-456-7890</span> |
            <span th:text="${personalInfo.location}">City, State</span><br/>
            <span th:if="${personalInfo.linkedin != null}" th:text="${personalInfo.linkedin}">linkedin.com/in/name</span>
            <span th:if="${personalInfo.github != null}" th:text="' | ' + ${personalInfo.github}">github.com/name</span>
        </div>
        <p th:if="${personalInfo.summary != null}" th:text="${personalInfo.summary}" style="text-align: justify; margin-bottom: 10px;"></p>
    </div>

    <div th:if="${skills != null and !skills.isEmpty()}">
        <h2>Skills</h2>
        <div class="skills" th:each="skillCat : ${skills}">
            <span class="skill-category" th:text="${skillCat.category} + ': '">Category:</span>
            <span th:text="${#strings.listJoin(skillCat.items, ', ')}">Skill 1, Skill 2</span>
        </div>
    </div>

    <div th:if="${experiences != null and !experiences.isEmpty()}">
        <h2>Experience</h2>
        <div th:each="exp : ${experiences}" style="margin-bottom: 10px;">
            <div class="item-header">
                <span class="item-title" th:text="${exp.title}">Job Title</span>
                <span class="item-date" th:text="${exp.startDate} + ' - ' + ${exp.endDate}">Date</span>
                <div class="clear"></div>
            </div>
            <div class="company" th:text="${exp.company}">Company Name</div>
            
            <div th:each="proj : ${exp.projects}" style="margin-bottom: 5px;">
                <div style="font-weight: bold; font-size: 10.5pt;" th:if="${proj.name != null}" th:text="${proj.name}">Project Name</div>
                <ul th:if="${proj.bullets != null and !proj.bullets.isEmpty()}">
                    <li th:each="bullet : ${proj.bullets}" th:text="${bullet.text}">Bullet point</li>
                </ul>
            </div>
        </div>
    </div>

    <div th:if="${education != null and !education.isEmpty()}">
        <h2>Education</h2>
        <div th:each="edu : ${education}" style="margin-bottom: 5px;">
            <div class="item-header">
                <span class="item-title" th:text="${edu.degree}">Degree</span>
                <span class="item-date" th:text="${edu.graduationDate}">Date</span>
                <div class="clear"></div>
            </div>
            <div class="company" th:text="${edu.institution}">Institution</div>
        </div>
    </div>

    <div th:if="${certifications != null and !certifications.isEmpty()}">
        <h2>Certifications</h2>
        <div th:each="cert : ${certifications}" style="margin-bottom: 5px;">
            <div class="item-header">
                <span class="item-title" th:text="${cert.name}">Cert Name</span>
                <span class="item-date" th:text="${cert.date}">Date</span>
                <div class="clear"></div>
            </div>
            <div class="company" th:text="${cert.issuer}">Issuer</div>
        </div>
    </div>
</body>
</html>
