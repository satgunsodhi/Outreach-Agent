name: Outreach Agent/Daily Run

on:
  schedule:
    - cron: "4 0 * * 1-5"     # weekdays only
  workflow_dispatch:          # also allows manual trigger

jobs:
  run-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 180       # 3-hour max (8am–11am window)

    steps:
      - uses: actions/checkout@v4
        with:
          ref: actions

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn package -DskipTests -B

      - name: Run Outreach Agent
        env:
          SPRING_PROFILES_ACTIVE: openrouter,production
          CI_BATCH_MODE: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          GOOGLE_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_NAME: ${{ secrets.OPENROUTER_MODEL_NAME }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        run: |
          touch .env
          JAR=$(ls target/outreach-agent-*.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: outreach-agent JAR not found in target/. Build may have failed." >&2
            exit 1
          fi

          echo "Waiting for PostgreSQL database to be reachable..."
          for i in {1..12}; do
            if pg_isready -d "$DATABASE_URL" -t 5 > /dev/null 2>&1; then
              echo "Database is ready!"
              break
            fi
            echo "Database not ready, waiting 5 seconds... ($i/12)"
            sleep 5
          done
          
          max_attempts=3
          attempt=1
          success=false
          
          while [ $attempt -le $max_attempts ]; do
            echo "Starting execution attempt $attempt of $max_attempts..."
            if java -jar "$JAR"; then
              echo "Execution completed successfully!"
              success=true
              break
            else
              echo "WARNING: Attempt $attempt failed."
              if [ $attempt -lt $max_attempts ]; then
                echo "Sleeping for 30 seconds before retrying..."
                sleep 30
              fi
            fi
            attempt=$((attempt + 1))
          done
          
          if [ "$success" = "false" ]; then
            echo "ERROR: Outreach Agent failed after $max_attempts attempts." >&2
            exit 1
          fi
